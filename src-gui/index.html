<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WXP Example Gain</title>
    <!--
      Load the entry point as a Vite module script.
      In debug builds, the Vite dev server serves the .ts file directly.
      In release builds, it is compiled into a bundled JS file.
    -->
    <script type="module" src="/src/main.ts"></script>
  </head>
  <body>
    <div id="app">
      <main class="panel">
        <p class="eyebrow">WXP Example Plugin</p>
        <h1 class="title">Gain</h1>
        <!-- Meter display: linear gain value (e.g., "1.00x") and dB value (e.g., "0.0 dB") -->
        <div class="meter">
          <div class="value" id="gain-value">1.00x</div>
          <div class="db" id="gain-db">0.0 dB</div>
        </div>
        <!--
          Knob UI:
          - knob-track:     Background track of the knob (arc)
          - knob-fill:      Filled portion indicating the current value (rotated via CSS transform)
          - knob-indicator: Indicator line showing the current position (rotated via CSS transform)
          main.ts dynamically updates the transform of knob-fill and knob-indicator.
        -->
        <section class="knob-zone">
          <button class="knob" id="gain-knob" type="button" aria-label="Gain knob">
            <div class="knob-track"></div>
            <div class="knob-fill" id="knob-fill"></div>
            <div class="knob-indicator" id="knob-indicator"></div>
          </button>
        </section>
        <p class="hint">Drag or scroll to adjust</p>
      </main>
    </div>
  </body>
</html>
