[workspace]
members = [
    "src-plugin",
    "xtask",
    "crates/wrac_clap_adapter",
    "crates/wrac_wxp_gui",
]
resolver = "2"

[workspace.dependencies]
novonotes_run_loop = { git = "https://github.com/novonotes/wxp.git", package = "novonotes_run_loop", rev = "354d187b8b688b653bdb997f5da68aeff63aa7b0" }
run_loop_timer = { git = "https://github.com/novonotes/wxp.git", package = "run_loop_timer", rev = "354d187b8b688b653bdb997f5da68aeff63aa7b0" }
wrac_clap_adapter = { path = "crates/wrac_clap_adapter" }
wrac_wxp_gui = { path = "crates/wrac_wxp_gui" }
wxp = { git = "https://github.com/novonotes/wxp.git", rev = "354d187b8b688b653bdb997f5da68aeff63aa7b0" }
